name: PR Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  info-job-1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Print information (Job 1)
        run: |
          echo "Running PR workflow - Info Job 1"
          echo "PR #${{ github.event.pull_request.number }}"
          echo "Branch: ${{ github.head_ref }}"
          echo "Repository: ${{ github.repository }}"
          echo "Event name: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"

      - name: Always set env and create artifact file
        run: |
          echo "SPECIAL_VAR=true" >> $GITHUB_ENV
          echo "SPECIAL_VAR=true" > result.txt

      - name: Wait for manual cancellation
        run: sleep 60

      - name: Upload artifact if SPECIAL_VAR=true (with run id)
#        if: env.SPECIAL_VAR == 'true'
        if: ${{ cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: info-job-1-result-${{ github.run_id }}
          path: result.txt

  info-job-2:
    runs-on: ubuntu-latest
    needs: info-job-1
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Print information (Job 2)
        run: |
          echo "Running PR workflow - Info Job 2"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run number: ${{ github.run_number }}"
          echo "Server URL: ${{ github.server_url }}"
          echo "SHA: ${{ github.sha }}"
